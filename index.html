<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meme Vault</title>
    <link rel="stylesheet" href="bootstrap.min.css" />
    <style>
      #memeImg {
        max-width: 100%;
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body class="bg-dark text-light">
    <div class="container mt-5 text-center">
      <h1
        class="display-1 fw-extrabold text-danger text-center"
        style="
          text-shadow:
            3px 3px 0px #000,
            6px 6px 0px rgba(0, 0, 0, 0.2);
        "
      >
        موقع ابضنني
      </h1>
      <p class="text-white-50 fs-5">اضغط الزرار علي مسؤوليتك الخاصة</p>

      <div class="mt-4">
        <button
          id="actionBtn"
          class="btn btn-danger btn-lg px-4 fw-bold shadow"
        >
          ابضني
        </button>
      </div>

      <div class="row justify-content-center mt-4">
        <div class="col-md-6 col-lg-4">
          <div id="memeBox" class="d-none">
            <img
              id="memeImg"
              src=""
              alt="Meme Image"
            />
          </div>
        </div>
      </div>
    </div>

    <script src="jquery-4.0.0.min.js"></script>
    <script src="bootstrap.bundle.min.js"></script>

    <script>
      $(document).ready(function () {
                const myImages = [
          "imgs/WhatsApp Image 2026-05-23 at 12.09.41 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.41 AM (3).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.41 AM (4).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.41 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.42 AM (1).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.42 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.42 AM (3).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.42 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.44 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.36 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.36 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.37 AM (1).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.37 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.37 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.38 AM (1).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.38 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.38 AM (3).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.38 AM (4).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.38 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.39 AM (1).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.39 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.39 AM (3).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.39 AM (4).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.39 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM (1).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM (2).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM (3).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM (4).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM (5).jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.40 AM.jpeg",
          "imgs/WhatsApp Image 2026-05-23 at 12.09.41 AM (1).jpeg"
        ];

        let availableImages = [...myImages];

        $("#actionBtn").click(function () {
          if (availableImages.length === 0) {
            availableImages = [...myImages];
          }
          
          const randomIndex = Math.floor(Math.random() * availableImages.length);
          const selectedImg = availableImages[randomIndex];
          
          availableImages.splice(randomIndex, 1);
          
          $("#memeImg").attr("src", selectedImg);
          $("#memeBox").removeClass("d-none").hide().fadeIn(500);
        });
      });
    </script>
  </body>
</html>
